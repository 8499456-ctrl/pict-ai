<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Pict · 反馈管理</title>
  <style>
    :root{color-scheme:dark;--bg:#0a0a1a;--card:#17132d;--line:rgba(255,255,255,.12);--muted:rgba(255,255,255,.6);--accent:#a78bfa}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0,#28155a 0,transparent 35%),var(--bg);color:#f5f3ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.55}.wrap{max-width:900px;margin:0 auto;padding:48px 20px}h1{font-size:28px;margin:0 0 6px}.intro{color:var(--muted);margin:0 0 24px}.login,.item{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px}.login{max-width:480px}.row{display:flex;gap:10px;align-items:center}input,button{font:inherit;border-radius:10px;padding:11px 13px}input{flex:1;min-width:0;background:#0d0a1f;color:white;border:1px solid var(--line)}button{border:0;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:white;font-weight:700;cursor:pointer}.status{min-height:24px;color:var(--muted);font-size:14px;margin:12px 0 0}.list{display:grid;gap:14px;margin-top:22px}.item-top{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:13px}.tag{color:#ddd6fe;background:#30255a;padding:2px 9px;border-radius:99px}.message{white-space:pre-wrap;overflow-wrap:anywhere;margin:13px 0 8px;font-size:16px}.email{color:var(--accent);font-size:14px}.empty{color:var(--muted);text-align:center;padding:30px}.hidden{display:none}@media(max-width:520px){.wrap{padding-top:30px}.row{align-items:stretch;flex-direction:column}.item-top{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>💬 Pict 访客反馈</h1>
    <p class="intro">这是仅供网站管理员查看的页面。管理密码不会保存在浏览器中。</p>
    <section class="login" id="loginBox">
      <label for="token">管理密码</label>
      <div class="row"><input id="token" type="password" autocomplete="current-password" placeholder="输入你在 Cloudflare 设置的密码" /><button id="load" type="button">查看反馈</button></div>
      <p class="status" id="status"></p>
    </section>
    <section class="list hidden" id="list" aria-live="polite"></section>
  </main>
  <script>
    const status=document.getElementById('status'), list=document.getElementById('list'), token=document.getElementById('token');
    const typeNames={idea:'功能建议',problem:'遇到问题',result:'效果需要改进',other:'其他'};
    function escapeHtml(value){const node=document.createElement('span');node.textContent=value||'';return node.innerHTML}
    function render(messages){list.classList.remove('hidden');if(!messages.length){list.innerHTML='<div class="item empty">暂时还没有新的反馈。</div>';return}list.innerHTML=messages.map(item=>{const date=new Date(item.createdAt).toLocaleString('zh-CN',{dateStyle:'medium',timeStyle:'short'});return `<article class="item"><div class="item-top"><span class="tag">${escapeHtml(typeNames[item.type]||'其他')}</span><time>${escapeHtml(date)}</time></div><div class="message">${escapeHtml(item.message)}</div>${item.email?`<div class="email">${escapeHtml(item.email)}</div>`:''}</article>`}).join('')}
    async function loadFeedback(){const value=token.value.trim();if(!value){status.textContent='请先输入管理密码。';return}status.textContent='正在读取…';list.classList.add('hidden');try{const response=await fetch('/api/feedback',{headers:{'X-Pict-Admin-Token':value}});const data=await response.json();if(!response.ok)throw new Error(data.error||'无法读取反馈。');status.textContent=`已加载 ${data.feedback.length} 条反馈。`;render(data.feedback)}catch(error){status.textContent=error.message||'无法读取反馈。'}}
    document.getElementById('load').addEventListener('click',loadFeedback);token.addEventListener('keydown',event=>{if(event.key==='Enter')loadFeedback()});
  </script>
</body>
</html>
